

[cursor.style]
blinking = "Always"

[env]
TERM = "xterm-256color"

[font]
size = 11

[font.normal]
family = "RobotoMono Nerd Font"
style = "Regular"

[font.bold]
family = "RobotoMono Nerd Font"
style = "Bold"

[font.italic]
family = "RobotoMono Nerd Font"
style = "Italic"

[font.offset]
x = 0
y = 3

[[keyboard.bindings]]
action = "ToggleViMode"
key = "C"
mods = "Alt"

[mouse]
hide_when_typing = true

[window]
decorations = "none"
opacity = 0.85
padding = { x = 10, y = 7 }
dynamic_padding = true
dimensions = { columns = 100, lines = 25 }

[general]
import = ["/home/shd/.config/alacritty/themes/themes/ashes_light.toml"]
